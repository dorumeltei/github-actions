name: Homework Demo - Firebase Project File Check

on:
  # Run automatically when code is pushed to the main branch.
  push:
    branches:
      - main
  # Allow the workflow to be started manually from the GitHub Actions tab.
  workflow_dispatch:

jobs:
  repository-inspection-demo:
    # The job runs on GitHub's Ubuntu runner.
    runs-on: ubuntu-latest

    steps:
      # This step downloads the repository files into the runner.
      - name: Step 1 - Download the repository code
        uses: actions/checkout@v4

      # This step shows the top-level files so we can confirm the workflow
      # can access the project contents in the CI environment.
      - name: Step 2 - List top-level project files
        run: ls -la

      # This step prints Firebase configuration and lists function files.
      # It demonstrates how a workflow can inspect project resources before
      # later tasks such as testing, building, or deployment.
      - name: Step 3 - Display Firebase configuration and functions files
        run: |
          echo "firebase.json contents:"
          cat firebase.json
          echo
          echo "functions directory contents:"
          find functions -maxdepth 2 -type f | sort
